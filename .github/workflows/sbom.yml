name: SBOM

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — same cadence as Dependabot so newly
    # opened dep PRs land alongside a fresh advisory scan.
    - cron: "0 6 * * 1"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    name: Build SBOM and run advisory scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4

      - name: Build release classpath
        run: ./gradlew :app:assembleRelease --stacktrace || true

      - name: Generate SPDX SBOM from release classpath
        uses: anchore/sbom-action@v0
        with:
          path: app/build
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlumen-sbom-${{ github.run_id }}
          path: sbom.spdx.json
          retention-days: 30

      - name: Advisory scan against the SBOM
        uses: anchore/scan-action@v6
        id: scan
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: medium
          output-format: table

      - name: Upload advisory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openlumen-advisory-report-${{ github.run_id }}
          path: ${{ steps.scan.outputs.sarif }}
          retention-days: 30
