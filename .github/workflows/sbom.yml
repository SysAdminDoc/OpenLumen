name: SBOM

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — same cadence as Dependabot so newly
    # opened dep PRs land alongside a fresh advisory scan.
    - cron: "0 6 * * 1"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    name: Build SBOM and run advisory scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v6

      - name: Build release classpath
        # The previous `|| true` swallowed real build failures and let the
        # SBOM job run against a half-built or stale `app/build` tree. If
        # the release build genuinely fails we want the workflow to fail
        # so the maintainer sees the underlying problem rather than a
        # quietly-empty SBOM.
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Generate SPDX SBOM from release classpath
        uses: anchore/sbom-action@v0
        with:
          path: app/build
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: openlumen-sbom-${{ github.run_id }}
          path: sbom.spdx.json
          retention-days: 30

      - name: Advisory scan against the SBOM (SARIF)
        # The advisory report is uploaded below; we need a real SARIF
        # output (not the table-only render) for the upload-artifact
        # step to have a non-empty path. Previously the workflow used
        # `output-format: table`, which left `${{ steps.scan.outputs.sarif }}`
        # empty and made the upload-artifact step fail every Monday —
        # CI noise that desensitised the maintainer.
        uses: anchore/scan-action@v7
        id: scan
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: medium
          output-format: sarif

      - name: Render advisory scan summary as table to workflow log
        # Keep the human-readable summary in the run log even though the
        # uploaded artifact is the SARIF (machine-readable). The previous
        # workflow only had the table form and lost it on artifact upload.
        if: always()
        run: |
          set -euo pipefail
          SARIF="${{ steps.scan.outputs.sarif }}"
          if [ -z "${SARIF}" ] || [ ! -s "${SARIF}" ]; then
            echo "::warning::No SARIF output to summarize."
            exit 0
          fi
          # Count findings by severity for a one-line summary. Grype/SARIF
          # results use rule-level severity in `runs[].results[].level`.
          python3 - <<'PY' "${SARIF}"
          import json, sys, collections
          with open(sys.argv[1]) as f:
              data = json.load(f)
          counts = collections.Counter()
          for run in data.get("runs", []):
              for r in run.get("results", []):
                  counts[r.get("level", "none")] += 1
          if not counts:
              print("Advisory scan: no findings above the configured cutoff.")
          else:
              print("Advisory scan findings by level:")
              for k, v in sorted(counts.items()):
                  print(f"  {k}: {v}")
          PY

      - name: Upload advisory report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openlumen-advisory-report-${{ github.run_id }}
          path: ${{ steps.scan.outputs.sarif }}
          retention-days: 30
          if-no-files-found: warn
