name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Actions are pinned to major-version tags rather than commit SHAs because
# Dependabot tracks tags more cleanly. If a supply-chain incident is
# confirmed against one of these, repin to a specific SHA per
# https://docs.github.com/en/actions/security-for-github-actions/security-hardening-for-github-actions.
jobs:
  build-debug:
    name: assembleDebug + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:assembleDebug :app:lint --stacktrace

  unit-tests:
    name: Module unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          ./gradlew \
            :app:testDebugUnitTest \
            :core-engine:test \
            :core-schedule:test \
            :core-prefs:test \
            --stacktrace

  permissions-audit:
    name: Permissions audit (no INTERNET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate built APK
        id: find_apk
        run: |
          APK=$(ls app/build/outputs/apk/debug/app-debug.apk)
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Assert no INTERNET / ACCESS_NETWORK_STATE permission
        env:
          APK: ${{ steps.find_apk.outputs.apk }}
        run: |
          set -euo pipefail
          # aapt2 is bundled with the Android build tools that AGP downloads;
          # we let Gradle have set it up by running assembleDebug first.
          AAPT="$ANDROID_HOME/build-tools/$(ls -1 "$ANDROID_HOME/build-tools" | tail -n1)/aapt2"
          if [ ! -x "$AAPT" ]; then
            AAPT="$ANDROID_HOME/build-tools/$(ls -1 "$ANDROID_HOME/build-tools" | tail -n1)/aapt"
          fi
          echo "Using AAPT at: $AAPT"
          PERMS=$("$AAPT" dump permissions "$APK" || true)
          echo "$PERMS"
          if echo "$PERMS" | grep -E "android\.permission\.(INTERNET|ACCESS_NETWORK_STATE|ACCESS_WIFI_STATE)" > /dev/null; then
            echo "::error::Network permission detected in merged manifest. OpenLumen must never request these." >&2
            exit 1
          fi
          echo "OK: no network permissions in merged manifest."

      - name: Assert no Play Services / Firebase dependency
        run: |
          set -euo pipefail
          ./gradlew :app:dependencies --configuration releaseRuntimeClasspath > deps.txt
          if grep -E "(play-services|firebase|com\.google\.android\.gms)" deps.txt; then
            echo "::error::Disallowed dependency found in releaseRuntimeClasspath." >&2
            exit 1
          fi
          echo "OK: no Play Services / Firebase / GMS in releaseRuntimeClasspath."
