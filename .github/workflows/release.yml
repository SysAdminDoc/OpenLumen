name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to release (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$HOME/openlumen-release.jks"
          echo "OPENLUMEN_KEYSTORE=$HOME/openlumen-release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          OPENLUMEN_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          OPENLUMEN_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          OPENLUMEN_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             "dist/OpenLumen-v${{ inputs.version }}-release.apk"

      - name: SHA-256
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "OpenLumen $tag" \
              --notes-file CHANGELOG.md \
              --draft
          fi
          gh release upload "$tag" dist/* --clobber

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:lint
